<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- BACKGROUNDS -->
    <linearGradient id="bgLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>

    <linearGradient id="bgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- ENERGY GLOW -->
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- BOLT -->
    <linearGradient id="bolt">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- GLOW FILTER -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="8">
        <animate attributeName="stdDeviation" values="6;10;6" dur="2.5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="600" fill="url(#bgLight)" class="dark:hidden"/>
  <rect width="1200" height="600" fill="url(#bgDark)" class="hidden dark:block"/>

  <!-- CENTER GLOW PULSE -->
  <circle cx="600" cy="300" r="320" fill="url(#glow)">
    <animate attributeName="r" values="300;340;300" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- SPEED LINES (animated movement) -->
  <g stroke="#6366f1" stroke-width="2" opacity="0.25">
    <path d="M-200 180 L220 180">
      <animate attributeName="x1" values="-200;0;-200" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="220;420;220" dur="2s" repeatCount="indefinite"/>
    </path>

    <path d="M-300 240 L180 240">
      <animate attributeName="x1" values="-300;-100;-300" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="180;380;180" dur="2.2s" repeatCount="indefinite"/>
    </path>

    <path d="M-250 360 L220 360">
      <animate attributeName="x1" values="-250;-50;-250" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="220;420;220" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- LIGHTNING BOLT -->
  <path
    d="M520 110 L660 110 L560 290 L740 290 L480 530 L560 350 L420 350 Z"
    fill="url(#bolt)"
  >
    <animate attributeName="opacity"
      values="0.8;1;0.8"
      dur="1.5s"
      repeatCount="indefinite"/>
  </path>

  <!-- PARTICLES -->
  <g fill="#22d3ee" opacity="0.8">

    <circle cx="780" cy="200" r="3">
      <animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="820" cy="260" r="2">
      <animate attributeName="cy" values="260;240;260" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="760" cy="340" r="3">
      <animate attributeName="cy" values="340;320;340" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="840" cy="380" r="2">
      <animate attributeName="cy" values="380;360;380" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="700" cy="420" r="3">
      <animate attributeName="cy" values="420;400;420" dur="3.5s" repeatCount="indefinite"/>
    </circle>

  </g>

</svg>
